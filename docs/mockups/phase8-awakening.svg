<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Tutorial Phase 8: Awakening introduces meta-loop (final tutorial phase) -->
  <defs>
    <radialGradient id="ng8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40D0D0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#40D0D0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#40D0D0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="360" height="720" fill="#05070d"/>
  <rect x="0" y="0" width="360" height="24" fill="#000"/>
  <text x="12" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888">10:08</text>
  <text x="348" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888" text-anchor="end">98%</text>
  <!-- Hero pair -->
  <text x="20" y="60" font-family="JetBrains Mono, monospace" font-size="32" font-weight="900" fill="#F0A030" font-variant-numeric="tabular-nums">20K</text>
  <text x="20" y="78" font-family="-apple-system, sans-serif" font-size="11" fill="#7070a0">thoughts</text>
  <text x="340" y="60" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#22B07A" text-anchor="end">+50/s</text>
  <!-- Awakening progress bar — appears for the first time, near 80% -->
  <rect x="20" y="92" width="320" height="3" rx="1.5" fill="#1a1d2a"/>
  <rect x="20" y="92" width="256" height="3" rx="1.5" fill="#F0A030"/>
  <text x="20" y="112" font-family="-apple-system, sans-serif" font-size="11" fill="#F0A030" opacity="0.9">80% to Awakening</text>
  <!-- Focus bar -->
  <rect x="20" y="130" width="320" height="4" rx="2" fill="#1a1d2a"/>
  <rect x="20" y="130" width="245" height="4" rx="2" fill="#40D0D0"/>
  <!-- Many neurons -->
  <g transform="translate(180, 360)">
    <circle cx="-30" cy="-30" r="34" fill="url(#ng8)"/>
    <circle cx="30" cy="-30" r="34" fill="url(#ng8)"/>
    <circle cx="-50" cy="-5" r="34" fill="url(#ng8)"/>
    <circle cx="50" cy="-5" r="34" fill="url(#ng8)"/>
    <circle cx="0" cy="0" r="34" fill="url(#ng8)"/>
    <circle cx="-30" cy="30" r="34" fill="url(#ng8)"/>
    <circle cx="30" cy="30" r="34" fill="url(#ng8)"/>
    <circle cx="0" cy="50" r="34" fill="url(#ng8)"/>
    <circle cx="-30" cy="-30" r="9" fill="#40D0D0" fill-opacity="0.4" stroke="#40D0D0" stroke-width="1.2"/>
    <circle cx="30" cy="-30" r="9" fill="#40D0D0" fill-opacity="0.4" stroke="#40D0D0" stroke-width="1.2"/>
    <circle cx="-50" cy="-5" r="9" fill="#40D0D0" fill-opacity="0.4" stroke="#40D0D0" stroke-width="1.2"/>
    <circle cx="50" cy="-5" r="9" fill="#40D0D0" fill-opacity="0.4" stroke="#40D0D0" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="11" fill="#40D0D0" fill-opacity="0.4" stroke="#40D0D0" stroke-width="1.4"/>
    <circle cx="-30" cy="30" r="9" fill="#40D0D0" fill-opacity="0.4" stroke="#40D0D0" stroke-width="1.2"/>
    <circle cx="30" cy="30" r="9" fill="#40D0D0" fill-opacity="0.4" stroke="#40D0D0" stroke-width="1.2"/>
    <circle cx="0" cy="50" r="9" fill="#40D0D0" fill-opacity="0.4" stroke="#40D0D0" stroke-width="1.2"/>
  </g>
  <text x="180" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#7070a0" text-anchor="middle" opacity="0.85">...beyond this self...</text>
  <!-- 3 tabs now: Mind, Neurons, Upgrades — Mind just appeared, pulses -->
  <rect x="0" y="660" width="360" height="60" fill="#0a0d1a" stroke="#1a1d2a" stroke-width="1"/>
  <text x="60" y="690" font-family="-apple-system, sans-serif" font-size="13" font-weight="500" fill="#7070a0" text-anchor="middle">Mind</text>
  <circle cx="80" cy="678" r="3" fill="#22B07A"/>
  <text x="180" y="690" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#8B7FE8" text-anchor="middle">Neurons</text>
  <text x="300" y="690" font-family="-apple-system, sans-serif" font-size="13" font-weight="500" fill="#7070a0" text-anchor="middle">Upgrades</text>
  <rect x="160" y="704" width="40" height="2" rx="1" fill="#8B7FE8"/>
  <text x="180" y="715" font-family="-apple-system, sans-serif" font-size="9" fill="#383860" text-anchor="middle" letter-spacing="0.1em">PHASE 8 — AWAKENING NEAR</text>
</svg>
