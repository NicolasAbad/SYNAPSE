<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Tutorial Phase 4: Production begins (rate counter appears) -->
  <defs>
    <radialGradient id="ng4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40D0D0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#40D0D0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#40D0D0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="360" height="720" fill="#05070d"/>
  <rect x="0" y="0" width="360" height="24" fill="#000"/>
  <text x="12" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888">9:44</text>
  <text x="348" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888" text-anchor="end">100%</text>
  <!-- Hero pair -->
  <text x="20" y="58" font-family="JetBrains Mono, monospace" font-size="28" font-weight="900" fill="#F0A030" font-variant-numeric="tabular-nums">15</text>
  <text x="20" y="76" font-family="-apple-system, sans-serif" font-size="11" fill="#7070a0">thoughts</text>
  <!-- Rate counter — fades in for the first time -->
  <text x="340" y="58" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#22B07A" text-anchor="end" opacity="0.85">+0.5/s</text>
  <!-- Two neurons now -->
  <circle cx="160" cy="360" r="42" fill="url(#ng4)"/>
  <circle cx="160" cy="360" r="14" fill="#40D0D0" fill-opacity="0.5" stroke="#40D0D0" stroke-opacity="0.95" stroke-width="1.5"/>
  <circle cx="220" cy="360" r="42" fill="url(#ng4)"/>
  <circle cx="220" cy="360" r="14" fill="#40D0D0" fill-opacity="0.5" stroke="#40D0D0" stroke-opacity="0.95" stroke-width="1.5"/>
  <text x="180" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#7070a0" text-anchor="middle" opacity="0.75">...thoughts flow...</text>
  <text x="180" y="700" font-family="-apple-system, sans-serif" font-size="9" fill="#383860" text-anchor="middle" letter-spacing="0.1em">PHASE 4 — PRODUCTION BEGINS</text>
</svg>
