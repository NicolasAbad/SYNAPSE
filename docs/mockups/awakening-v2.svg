<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <!-- AwakeningScreen V2 — sectioned (Gains / Resets / Estimate / Record / Resonant) per original mockup -->
  <rect width="360" height="720" fill="#05070d"/>
  <rect x="0" y="0" width="360" height="24" fill="#000"/>
  <text x="12" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888">10:32</text>
  <text x="348" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888" text-anchor="end">88%</text>
  <!-- Title -->
  <text x="180" y="74" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#8B7FE8" text-anchor="middle" letter-spacing="0.04em">AWAKENING</text>
  <text x="180" y="96" font-family="-apple-system, sans-serif" font-size="11" fill="#7070a0" text-anchor="middle" font-style="italic">Your mind is ready to evolve</text>
  <!-- GREEN SECTION — Gains -->
  <rect x="20" y="116" width="320" height="92" rx="10" fill="#22B07A08" stroke="#22B07A30" stroke-width="1"/>
  <text x="36" y="138" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#60D0A0" letter-spacing="0.08em">YOU GAIN</text>
  <text x="36" y="158" font-family="-apple-system, sans-serif" font-size="13" fill="#22B07A">+3 Patterns · +2 Memories</text>
  <text x="36" y="176" font-family="-apple-system, sans-serif" font-size="13" fill="#22B07A">+1 Region: Prefrontal Cortex</text>
  <text x="36" y="196" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#40D0D0">★ Unlock: Polarity choice</text>
  <!-- RED SECTION — Resets -->
  <rect x="20" y="220" width="320" height="48" rx="10" fill="#E8505008" stroke="#E8505020" stroke-width="1"/>
  <text x="36" y="240" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#F0A0A0" letter-spacing="0.08em">RESETS</text>
  <text x="36" y="258" font-family="-apple-system, sans-serif" font-size="12" fill="#E8505080">Neurons, thoughts, upgrades</text>
  <!-- BLUE SECTION — Estimate -->
  <rect x="20" y="280" width="320" height="38" rx="10" fill="#4090E008" stroke="#4090E020" stroke-width="1"/>
  <text x="36" y="304" font-family="-apple-system, sans-serif" font-size="12" fill="#80B8F0">Next cycle estimate: <tspan fill="#4090E0" font-weight="700">~20 min</tspan></text>
  <!-- AMBER SECTION — New Record -->
  <rect x="20" y="330" width="320" height="38" rx="10" fill="#F0A03008" stroke="#F0A03020" stroke-width="1"/>
  <text x="180" y="354" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#F0A030" text-anchor="middle">★ NEW RECORD: 19:48 (was 22:14)</text>
  <!-- GOLD DASHED — Resonant Pattern -->
  <rect x="20" y="384" width="320" height="48" rx="10" fill="#F0A03010" stroke="#F0A03040" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="180" y="404" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#F0A030" text-anchor="middle">✦ Resonant Pattern: The First Spark</text>
  <text x="180" y="420" font-family="-apple-system, sans-serif" font-size="9" fill="#F0A03080" text-anchor="middle">+5 Sparks · 1/4 patterns discovered</text>
  <!-- Big primary CTA -->
  <g transform="translate(180, 480)">
    <rect x="-160" y="-25" width="320" height="50" rx="25" fill="#8B7FE8"/>
    <text x="0" y="6" font-family="-apple-system, sans-serif" font-size="16" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0.04em">AWAKEN</text>
  </g>
  <!-- Secondary -->
  <text x="180" y="540" font-family="-apple-system, sans-serif" font-size="12" fill="#7070a0" text-anchor="middle">Later</text>
  <!-- Footer -->
  <text x="180" y="700" font-family="-apple-system, sans-serif" font-size="9" fill="#383860" text-anchor="middle" letter-spacing="0.1em">AWAKENING V2 — SECTIONED PATTERN</text>
</svg>
