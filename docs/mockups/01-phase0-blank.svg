<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <!-- SYNAPSE UI Mockup — Tutorial Phase 0: Pre-thought (blank with one neuron) -->
  <defs>
    <radialGradient id="neuronGlow0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40D0D0" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#40D0D0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#40D0D0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background — bgDeep -->
  <rect width="360" height="720" fill="#05070d"/>
  <!-- Phone status bar (system) -->
  <rect x="0" y="0" width="360" height="24" fill="#000000"/>
  <text x="12" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888">9:42</text>
  <text x="348" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888" text-anchor="end">100%</text>
  <!-- The single neuron — faint, centered, ambient pulse -->
  <circle cx="180" cy="360" r="40" fill="url(#neuronGlow0)"/>
  <circle cx="180" cy="360" r="14" fill="#40D0D0" fill-opacity="0.35" stroke="#40D0D0" stroke-opacity="0.7" stroke-width="1.2"/>
  <!-- Narrative beat — italic, low opacity, fades in/out -->
  <text x="180" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#7070a0" text-anchor="middle" opacity="0.75">...something stirs...</text>
  <!-- Footer label for the mockup -->
  <text x="180" y="700" font-family="-apple-system, sans-serif" font-size="9" fill="#383860" text-anchor="middle" letter-spacing="0.1em">PHASE 0 — PRE-THOUGHT</text>
</svg>
