<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <!-- SYNAPSE UI Mockup — Tutorial Phase 3: Buy first neuron (pivotal moment) -->
  <defs>
    <radialGradient id="neuronGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40D0D0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#40D0D0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#40D0D0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="buyButtonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0A030" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F0A030" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="360" height="720" fill="#05070d"/>
  <!-- System status bar -->
  <rect x="0" y="0" width="360" height="24" fill="#000000"/>
  <text x="12" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888">9:43</text>
  <text x="348" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888" text-anchor="end">100%</text>
  <!-- Tiny thoughts counter — top-left — no label yet was added in Phase 2 -->
  <text x="20" y="56" font-family="JetBrains Mono, monospace" font-size="32" font-weight="900" fill="#F0A030" font-variant-numeric="tabular-nums">10</text>
  <text x="20" y="74" font-family="-apple-system, sans-serif" font-size="11" fill="#7070a0">thoughts</text>
  <!-- The single neuron, brighter now (player has tapped multiple times) -->
  <circle cx="180" cy="320" r="44" fill="url(#neuronGlow3)"/>
  <circle cx="180" cy="320" r="14" fill="#40D0D0" fill-opacity="0.5" stroke="#40D0D0" stroke-opacity="0.95" stroke-width="1.5"/>
  <!-- Buy first additional neuron button — centered, in the canvas area, big and obvious -->
  <g transform="translate(180, 470)">
    <rect x="-110" y="-40" width="220" height="80" rx="12" fill="url(#buyButtonGrad)" stroke="#F0A030" stroke-width="1.5"/>
    <text x="0" y="-8" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#F0A030" text-anchor="middle">+1 neuron</text>
    <text x="0" y="18" font-family="-apple-system, sans-serif" font-size="11" fill="#e8e6f8" text-anchor="middle" opacity="0.8">10 thoughts · spend to grow</text>
  </g>
  <!-- Narrative beat -->
  <text x="180" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#7070a0" text-anchor="middle" opacity="0.75">...connections form...</text>
  <!-- Footer label -->
  <text x="180" y="700" font-family="-apple-system, sans-serif" font-size="9" fill="#383860" text-anchor="middle" letter-spacing="0.1em">PHASE 3 — BUY FIRST NEURON</text>
</svg>
