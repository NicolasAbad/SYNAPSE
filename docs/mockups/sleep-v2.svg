<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <!-- SleepScreen V2 — Lucid Dream pattern from original mockup -->
  <rect width="360" height="720" fill="#05070d"/>
  <rect x="0" y="0" width="360" height="24" fill="#000"/>
  <text x="12" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888">9:00</text>
  <text x="348" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888" text-anchor="end">100%</text>
  <!-- Star particles -->
  <circle cx="60" cy="80" r="2" fill="#F0A03030"/>
  <circle cx="180" cy="60" r="3" fill="#F0A03020"/>
  <circle cx="290" cy="90" r="2" fill="#8B7FE830"/>
  <circle cx="320" cy="170" r="2" fill="#F0A03020"/>
  <circle cx="50" cy="200" r="2" fill="#8B7FE830"/>
  <!-- Title -->
  <text x="180" y="140" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#8B7FE8" text-anchor="middle" letter-spacing="0.02em">Your mind dreamed</text>
  <text x="180" y="162" font-family="-apple-system, sans-serif" font-size="12" fill="#7070a0" text-anchor="middle">You were away for 7h 23m</text>
  <!-- Big amber thoughts gain card -->
  <rect x="30" y="190" width="300" height="64" rx="14" fill="#F0A03010" stroke="#F0A03030" stroke-width="1"/>
  <text x="180" y="220" font-family="JetBrains Mono, monospace" font-size="22" font-weight="800" fill="#F0A030" text-anchor="middle" font-variant-numeric="tabular-nums">+4,847,291</text>
  <text x="180" y="242" font-family="-apple-system, sans-serif" font-size="10" fill="#F0A03080" text-anchor="middle">thoughts (50% efficiency)</text>
  <!-- Discharge charges accumulated -->
  <text x="180" y="282" font-family="-apple-system, sans-serif" font-size="11" fill="#7070a0" text-anchor="middle">3 Discharge charges accumulated</text>
  <!-- LUCID DREAM panel -->
  <rect x="20" y="306" width="320" height="92" rx="14" fill="#8B7FE808" stroke="#8B7FE830" stroke-width="1"/>
  <text x="180" y="330" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#B0A8F0" text-anchor="middle" letter-spacing="0.08em">LUCID DREAM</text>
  <!-- Choice 1: +10% prod 1h -->
  <g transform="translate(20, 346)">
    <rect x="20" y="0" width="135" height="40" rx="8" fill="#22B07A15" stroke="#22B07A40" stroke-width="1.2"/>
    <text x="87" y="16" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#22B07A" text-anchor="middle">+10% prod</text>
    <text x="87" y="30" font-family="-apple-system, sans-serif" font-size="10" fill="#22B07A88" text-anchor="middle">for 1 hour</text>
  </g>
  <!-- Choice 2: +2 Memories -->
  <g transform="translate(20, 346)">
    <rect x="170" y="0" width="135" height="40" rx="8" fill="#8B7FE815" stroke="#8B7FE840" stroke-width="1.2"/>
    <text x="237" y="16" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#8B7FE8" text-anchor="middle">+2 Memories</text>
    <text x="237" y="30" font-family="-apple-system, sans-serif" font-size="10" fill="#8B7FE888" text-anchor="middle">permanent</text>
  </g>
  <!-- Optional ad row (subtle) -->
  <rect x="80" y="420" width="200" height="32" rx="8" fill="#ffffff04" stroke="#ffffff14" stroke-width="1"/>
  <text x="180" y="440" font-family="-apple-system, sans-serif" font-size="10" fill="#7070a0" text-anchor="middle">🎬 Watch ad: earnings ×2</text>
  <!-- Continue button -->
  <g transform="translate(180, 500)">
    <rect x="-120" y="-22" width="240" height="44" rx="22" fill="#22B07A"/>
    <text x="0" y="6" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Continue</text>
  </g>
  <!-- Footer -->
  <text x="180" y="700" font-family="-apple-system, sans-serif" font-size="9" fill="#383860" text-anchor="middle" letter-spacing="0.1em">SLEEP V2 — LUCID DREAM PATTERN</text>
</svg>
