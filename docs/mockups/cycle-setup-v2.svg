<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <!-- CycleSetupScreen V2 — incorporates "SAME AS BEFORE — START" big CTA from original mockups -->
  <rect width="360" height="720" fill="#05070d"/>
  <rect x="0" y="0" width="360" height="24" fill="#000"/>
  <text x="12" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888">10:30</text>
  <text x="348" y="16" font-family="-apple-system, sans-serif" font-size="11" fill="#888" text-anchor="end">88%</text>
  <!-- Full-screen modal background -->
  <rect x="0" y="24" width="360" height="696" fill="#05070d"/>
  <text x="180" y="58" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#e8e6f8" text-anchor="middle">Configure Cycle</text>
  <!-- 3 slot columns: Polarity / Mutation / Pathway -->
  <g transform="translate(16, 86)">
    <rect x="0" y="0" width="105" height="138" rx="10" fill="#0a0d1a" stroke="#F0A03040" stroke-width="1.5"/>
    <text x="52" y="20" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#7070a0" text-anchor="middle" letter-spacing="0.08em">POLARITY</text>
    <rect x="8" y="32" width="89" height="44" rx="6" fill="#F0A03015"/>
    <text x="52" y="52" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#F0A030" text-anchor="middle">⚡ Excitatory</text>
    <text x="52" y="66" font-family="-apple-system, sans-serif" font-size="9" fill="#F0A03088" text-anchor="middle">+20% prod · −12% disch</text>
    <rect x="8" y="86" width="89" height="22" rx="5" fill="#ffffff08"/>
    <text x="52" y="100" font-family="-apple-system, sans-serif" font-size="9" fill="#7070a0" text-anchor="middle">[change]</text>
  </g>
  <g transform="translate(127, 86)">
    <rect x="0" y="0" width="105" height="138" rx="10" fill="#0a0d1a" stroke="#40D0D040" stroke-width="1.5"/>
    <text x="52" y="20" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#7070a0" text-anchor="middle" letter-spacing="0.08em">MUTATION</text>
    <rect x="8" y="32" width="89" height="44" rx="6" fill="#40D0D015"/>
    <text x="52" y="52" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#40D0D0" text-anchor="middle">🧬 Sprint</text>
    <text x="52" y="66" font-family="-apple-system, sans-serif" font-size="9" fill="#40D0D088" text-anchor="middle">×5 5min · −20% rest</text>
    <rect x="8" y="86" width="89" height="22" rx="5" fill="#ffffff08"/>
    <text x="52" y="100" font-family="-apple-system, sans-serif" font-size="9" fill="#7070a0" text-anchor="middle">[change]</text>
  </g>
  <g transform="translate(238, 86)">
    <rect x="0" y="0" width="105" height="138" rx="10" fill="#0a0d1a" stroke="#8B7FE840" stroke-width="1.5"/>
    <text x="52" y="20" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#7070a0" text-anchor="middle" letter-spacing="0.08em">PATHWAY</text>
    <rect x="8" y="32" width="89" height="44" rx="6" fill="#8B7FE815"/>
    <text x="52" y="52" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#8B7FE8" text-anchor="middle">→ Swift</text>
    <text x="52" y="66" font-family="-apple-system, sans-serif" font-size="9" fill="#8B7FE888" text-anchor="middle">Focus++ · No regions</text>
    <rect x="8" y="86" width="89" height="22" rx="5" fill="#ffffff08"/>
    <text x="52" y="100" font-family="-apple-system, sans-serif" font-size="9" fill="#7070a0" text-anchor="middle">[change]</text>
  </g>
  <!-- BIG CTA — "SAME AS BEFORE — START" (the original mockup's signature) -->
  <g transform="translate(180, 280)">
    <rect x="-160" y="-26" width="320" height="52" rx="26" fill="#22B07A"/>
    <text x="0" y="6" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0.04em">▶ SAME AS BEFORE — START</text>
  </g>
  <!-- Secondary CTA -->
  <g transform="translate(180, 340)">
    <rect x="-160" y="-19" width="320" height="38" rx="19" fill="none" stroke="#ffffff20" stroke-width="1"/>
    <text x="0" y="5" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="#7070a0" text-anchor="middle">Start with changes</text>
  </g>
  <!-- Collapsible: What if preview -->
  <g transform="translate(180, 408)">
    <rect x="-160" y="-15" width="320" height="30" rx="6" fill="#4090E008" stroke="#4090E020" stroke-dasharray="3 3"/>
    <text x="0" y="3" font-family="-apple-system, sans-serif" font-size="10" fill="#80B8F0" text-anchor="middle">▾ What if? Ínsula: Excit+Sprint+Swift → ~16 min cycle</text>
  </g>
  <!-- Momentum bonus chip -->
  <g transform="translate(180, 460)">
    <rect x="-110" y="-15" width="220" height="30" rx="15" fill="#F0A03010" stroke="#F0A03040"/>
    <text x="0" y="3" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#F0A030" text-anchor="middle">⚡ Momentum: +45,291</text>
  </g>
  <!-- Footer label -->
  <text x="180" y="700" font-family="-apple-system, sans-serif" font-size="9" fill="#383860" text-anchor="middle" letter-spacing="0.1em">CYCLESETUP V2 — SAME-AS-BEFORE PATTERN</text>
</svg>
